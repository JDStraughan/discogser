name: Release

# On a version tag (e.g. v1.0.0): build the wheel/sdist, twine-check them, and
# create a GitHub Release with the artifacts attached. PyPI publishing is gated
# behind the repo variable PUBLISH_TO_PYPI so tagging is always safe, even
# before the PyPI Trusted Publisher is configured (see RELEASING.md).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build
    # Set the repo variable PUBLISH_TO_PYPI=true once Trusted Publishing is set up.
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
